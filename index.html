<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strivers A2Z DSA Sheet - File Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .breadcrumb span {
            cursor: pointer;
            color: #667eea;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .breadcrumb span:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .breadcrumb .separator {
            color: #999;
            cursor: default;
        }

        .breadcrumb .separator:hover {
            background: none;
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafafa;
        }

        .item:hover {
            background: #f0f4ff;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .item-icon {
            font-size: 20px;
            min-width: 24px;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-weight: 500;
            color: #333;
            word-break: break-word;
            font-size: 14px;
        }

        .item-type {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            padding: 15px;
            background: #fee;
            color: #c33;
            border-radius: 6px;
            border: 1px solid #fcc;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .back-button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .back-button:hover {
            background: #764ba2;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-number {
            font-weight: 600;
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Strivers A2Z DSA Sheet</h1>
            <p>Browse and explore your DSA solutions</p>
        </div>

        <div class="content">
            <div class="controls">
                <input 
                    type="text" 
                    class="search-box" 
                    id="searchInput" 
                    placeholder="🔍 Search files..."
                >
            </div>

            <div class="breadcrumb" id="breadcrumb">
                <span onclick="navigate('')">📂 Root</span>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading files...</p>
            </div>

            <div id="error" class="error" style="display: none;"></div>

            <div id="fileList" class="file-list"></div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📁</div>
                <p>No files found</p>
            </div>

            <div class="stats">
                <div class="stat">
                    📄 Files: <span class="stat-number" id="fileCount">0</span>
                </div>
                <div class="stat">
                    📁 Folders: <span class="stat-number" id="folderCount">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'Shivesh-Kumar-Kanoujia';
        const REPO_NAME = 'Strivers-A2Z-DSA-Sheet';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        let currentPath = '';
        let allItems = [];

        async function fetchContents(path = '') {
            const fileListDiv = document.getElementById('fileList');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            loadingDiv.style.display = 'block';
            fileListDiv.innerHTML = '';
            errorDiv.style.display = 'none';

            try {
                const url = path ? `${API_URL}/${path}` : API_URL;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                let data = await response.json();
                if (!Array.isArray(data)) {
                    data = [data];
                }

                // Filter out common unneeded files
                data = data.filter(item => !item.name.startsWith('.'));

                allItems = data;
                currentPath = path;

                updateBreadcrumb();
                renderItems(data);
                updateStats(data);

                loadingDiv.style.display = 'none';
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Failed to load contents: ${error.message}`;
                console.error('Error:', error);
            }
        }

        function renderItems(items) {
            const fileListDiv = document.getElementById('fileList');
            const emptyStateDiv = document.getElementById('emptyState');

            if (items.length === 0) {
                fileListDiv.innerHTML = '';
                emptyStateDiv.style.display = 'block';
                return;
            }

            emptyStateDiv.style.display = 'none';

            // Sort: folders first, then files
            const sorted = items.sort((a, b) => {
                if (a.type !== b.type) {
                    return a.type === 'dir' ? -1 : 1;
                }
                return a.name.localeCompare(b.name);
            });

            fileListDiv.innerHTML = sorted.map(item => `
                <div class="item" onclick="${item.type === 'dir' ? `navigate('${item.path}')` : `openInGitHub('${item.html_url}')`}">
                    <div class="item-icon">
                        ${item.type === 'dir' ? '📁' : getFileIcon(item.name)}
                    </div>
                    <div class="item-content">
                        <div class="item-name">${item.name}</div>
                        <div class="item-type">
                            ${item.type === 'dir' ? 'Folder' : 'File'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getFileIcon(filename) {
            if (filename.endsWith('.cpp')) return '⚙️';
            if (filename.endsWith('.py')) return '🐍';
            if (filename.endsWith('.java')) return '☕';
            if (filename.endsWith('.js')) return '📜';
            if (filename.endsWith('.md')) return '📝';
            if (filename.endsWith('.txt')) return '📄';
            return '📋';
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            const parts = currentPath.split('/').filter(p => p);

            let html = '<span onclick="navigate(\'\')">📂 Root</span>';

            if (parts.length > 0) {
                let path = '';
                parts.forEach((part, index) => {
                    path += (index === 0 ? '' : '/') + part;
                    html += ` <span class="separator">/</span> <span onclick="navigate('${path}')">${part}</span>`;
                });
            }

            breadcrumb.innerHTML = html;
        }

        function updateStats(items) {
            const fileCount = items.filter(i => i.type === 'file').length;
            const folderCount = items.filter(i => i.type === 'dir').length;

            document.getElementById('fileCount').textContent = fileCount;
            document.getElementById('folderCount').textContent = folderCount;
        }

        function navigate(path) {
            fetchContents(path);
            document.getElementById('searchInput').value = '';
        }

        function openInGitHub(url) {
            window.open(url, '_blank');
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();

            if (!searchTerm) {
                renderItems(allItems);
                updateStats(allItems);
                return;
            }

            const filtered = allItems.filter(item =>
                item.name.toLowerCase().includes(searchTerm)
            );

            renderItems(filtered);
            updateStats(filtered);
        });

        // Initial load
        fetchContents();
    </script>
</body>
</html>
